version: '3.8'
services:
  mongo:
    container_name: mongodb
    image: mongo:4
    environment:
      MONGO_DATA_DIR: /data/db
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  redis:
    container_name: redis
    image: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - '6379:6379'

volumes:
  mongo-data: